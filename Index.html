<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisaab - Business Management Dashboard</title>
    <!-- CDNs for Icons, Charts and PDF Generation -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        /* ==================== STYLING & THEME SYSTEM ==================== */
        :root {
            --primary: #064E3B; /* Dark Green */
            --primary-light: #047857;
            --secondary: #ffffff;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            
            --sidebar-width: 260px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius: 12px;
            --transition: all 0.25s ease-in-out;
        }

        [data-theme="dark"] {
            --primary: #10b981; 
            --primary-light: #34d399;
            --secondary: #1f2937;
            --bg-body: #111827;
            --bg-card: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border-color: #374151;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: var(--transition);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Buttons & Actions */
        button {
            cursor: pointer;
            border: none;
            outline: none;
            background: none;
            font-family: inherit;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
        }
        
        [data-theme="dark"] .btn-primary {
            color: #111827;
        }

        .btn-primary:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--danger);
            color: #ffffff;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .btn-outline {
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background-color: var(--bg-card);
            color: var(--text-main);
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.25);
        }

        /* ==================== SIDEBAR & MAIN WRAPPER ==================== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-links {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto;
        }

        .nav-item {
            padding: 0.85rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 550;
            transition: var(--transition);
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border-right: 4px solid var(--primary);
        }

        .main-wrapper {
            flex: 1;
            margin-left: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            width: calc(100% - var(--sidebar-width));
        }

        .top-navbar {
            height: 70px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .menu-toggle {
            display: none;
            font-size: 1.35rem;
            color: var(--text-main);
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: var(--bg-body);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            width: 320px;
            border: 1px solid var(--border-color);
        }

        .search-bar input {
            border: none;
            background: transparent;
            margin: 0;
            padding: 0 0.5rem;
            width: 100%;
        }

        .search-bar input:focus {
            box-shadow: none;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .nav-actions i {
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .nav-actions i:hover {
            color: var(--primary);
        }

        /* Content Sections */
        .content-area {
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
        }

        .view-section {
            display: none;
            animation: fadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== MODULES COMPONENTS ==================== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.75rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
        }

        .stat-info h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-info p {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
        }

        .icon-blue { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .icon-green { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .icon-orange { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .icon-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
        }

        .card-header {
            margin-bottom: 1.25rem;
            font-weight: 700;
            font-size: 1.15rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        /* ==================== TABLES & UNLIMITED SCROLLING ==================== */
        .table-responsive {
            width: 100%;
            max-height: 520px; /* Unlimited scroll setup */
            overflow-y: auto;
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }

        .table-responsive::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-responsive::-webkit-scrollbar-track {
            background: var(--bg-body);
        }

        .table-responsive::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--bg-body);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        tr:hover {
            background-color: rgba(0, 0, 0, 0.015);
        }

        [data-theme="dark"] tr:hover {
            background-color: rgba(255, 255, 255, 0.015);
        }

        .badge {
            padding: 0.3rem 0.65rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }

        .badge-success { background: rgba(16, 185, 129, 0.12); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.12); color: var(--warning); }
        .badge-danger { background: rgba(239, 68, 68, 0.12); color: var(--danger); }

        .action-btns {
            display: flex;
            gap: 0.75rem;
        }

        .action-btns button {
            color: var(--text-muted);
            font-size: 1.15rem;
            transition: var(--transition);
        }

        .action-btns button:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .customer-link {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
            transition: var(--transition);
        }

        .customer-link:hover {
            color: var(--primary-light);
        }

        /* ==================== BILLING SYSTEM LAYOUT ==================== */
        .billing-grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 1.5rem;
        }

        .bill-items-list {
            min-height: 240px;
            max-height: 350px;
            overflow-y: auto;
            border: 2px dashed var(--border-color);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.25rem;
            background: rgba(0, 0, 0, 0.005);
        }

        .bill-row-input {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 0.75rem;
            align-items: center;
            background: var(--bg-body);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.25rem;
        }

        .bill-totals .row {
            display: flex;
            justify-content: space-between;
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .bill-totals .row.grand-total {
            font-size: 1.35rem;
            font-weight: 700;
            border-bottom: none;
            color: var(--primary);
            padding-top: 1rem;
        }

        /* ==================== CUSTOM MODALS ==================== */
        dialog {
            margin: auto;
            border: none;
            border-radius: var(--radius);
            background-color: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 90%;
            max-width: 520px;
            padding: 0;
            max-height: 85vh;
            overflow-y: auto;
        }

        dialog#customerHistoryModal {
            max-width: 760px;
        }

        dialog::backdrop {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 10;
        }

        .modal-header h3 {
            font-weight: 700;
            color: var(--primary);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            position: sticky;
            bottom: 0;
            background: var(--bg-card);
            z-index: 10;
        }

        /* Print Design */
        #print-area {
            display: none;
        }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                color: #000;
                background: #fff;
                font-family: 'Courier New', Courier, monospace;
                padding: 1.5rem;
            }
        }

        /* ==================== RESPONSIVE RULES ==================== */
        @media (max-width: 1024px) {
            .dashboard-layout, .billing-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-wrapper {
                margin-left: 0;
                width: 100%;
            }
            .menu-toggle {
                display: block;
            }
            .search-bar {
                display: none;
            }
            .bill-row-input {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Print Area for Billing Invoice -->
    <div id="print-area"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-wallet"></i>
            <span id="sidebar-shop-title" data-i18n="app_name">Hisaab Shop</span>
            <button class="menu-toggle" id="closeSidebar" style="margin-left: auto;">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <ul class="nav-links">
            <li class="nav-item active" data-target="dashboard">
                <i class="fas fa-chart-pie"></i> <span data-i18n="nav_dashboard">Dashboard</span>
            </li>
            <li class="nav-item" data-target="customers">
                <i class="fas fa-users"></i> <span data-i18n="nav_customers">Customers</span>
            </li>
            <li class="nav-item" data-target="inventory">
                <i class="fas fa-box"></i> <span data-i18n="nav_inventory">Inventory</span>
            </li>
            <li class="nav-item" data-target="billing">
                <i class="fas fa-file-invoice-dollar"></i> <span data-i18n="nav_billing">Billing</span>
            </li>
            <li class="nav-item" data-target="reports">
                <i class="fas fa-chart-line"></i> <span data-i18n="nav_reports">Reports</span>
            </li>
            <li class="nav-item" data-target="settings">
                <i class="fas fa-sliders-h"></i> <span data-i18n="nav_settings">Settings</span>
            </li>
        </ul>
    </aside>

    <!-- WRAPPER -->
    <div class="main-wrapper">
        <!-- TOP NAVBAR -->
        <header class="top-navbar">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <i class="fas fa-bars menu-toggle" id="openSidebar"></i>
                <div class="search-bar">
                    <i class="fas fa-search text-muted"></i>
                    <input type="text" id="globalSearch" placeholder="Search data..." data-i18n-placeholder="search">
                </div>
            </div>
            <div class="nav-actions">
                <button id="langToggle" class="btn btn-outline" style="padding: 0.3rem 0.65rem; font-size: 0.85rem;">A/अ</button>
                <i class="fas fa-moon" id="themeToggle"></i>
            </div>
        </header>

        <!-- MAIN AREA -->
        <main class="content-area">
            
            <!-- VIEW: DASHBOARD -->
            <section id="view-dashboard" class="view-section active">
                <div class="page-header">
                    <h2 data-i18n="nav_dashboard">Dashboard</h2>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3 data-i18n="today_sales">Today's Sales</h3>
                            <p id="dash-today-sales">₹0.00</p>
                        </div>
                        <div class="stat-icon icon-blue"><i class="fas fa-cash-register"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3 data-i18n="monthly_profit">Monthly Profit</h3>
                            <p id="dash-monthly-profit">
